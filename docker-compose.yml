version: "3.8"

# ============================================================
#  PostgreSQL Monitoring Stack
#  PostgreSQL → postgres_exporter → Prometheus → Grafana
#                              ↘ PgBouncer
# ============================================================

networks:
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  pgbouncer_data:

services:

  # ─────────────────────────────────────────
  # 1. PostgreSQL (primary database)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres_primary
    restart: unless-stopped
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: appdb
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. PgBouncer (connection pooler)
  # ─────────────────────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: pgbouncer
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: pguser
      DATABASES_PASSWORD: pgpassword
      DATABASES_DBNAME: appdb
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_MIN_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_STATS_USERS: pguser
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_LISTEN_PORT: 6432
      PGBOUNCER_ADMIN_USERS: pguser
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring

  # ─────────────────────────────────────────
  # 3. postgres_exporter (metrics bridge)
  # ─────────────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://pguser:pgpassword@postgres:5432/appdb?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres_exporter/queries.yaml
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_METRIC_PREFIX: "pg"
    volumes:
      - ./postgres/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring

  # ─────────────────────────────────────────
  # 4. pgbouncer_exporter (PgBouncer metrics)
  # ─────────────────────────────────────────
  pgbouncer_exporter:
    image: prometheuscommunity/pgbouncer-exporter:latest
    container_name: pgbouncer_exporter
    restart: unless-stopped
    environment:
      PGBOUNCER_EXPORTER_CONNECTION_STRING: "postgresql://pguser:pgpassword@pgbouncer:6432/pgbouncer?sslmode=disable"
    ports:
      - "9127:9127"
    depends_on:
      - pgbouncer
    networks:
      - monitoring

  # ─────────────────────────────────────────
  # 5. Prometheus (metrics store)
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - postgres_exporter
    networks:
      - monitoring

  # ─────────────────────────────────────────
  # 6. Alertmanager (alert routing)
  # ─────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - monitoring

  # ─────────────────────────────────────────
  # 7. Grafana (dashboards & visualisation)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring