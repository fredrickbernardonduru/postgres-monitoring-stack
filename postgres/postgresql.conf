# ============================================================
#  PostgreSQL Configuration — Optimised for Observability
#  Tuned for a development / staging monitoring stack.
#  Adjust memory settings for production workloads.
# ============================================================

# ─── Connection Settings ────────────────────────────────────
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 3

# ─── Memory ─────────────────────────────────────────────────
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 128MB
effective_cache_size = 1GB

# ─── WAL & Checkpoints ──────────────────────────────────────
wal_level = replica                   # Required for replication monitoring
max_wal_senders = 5
wal_keep_size = 512MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 2GB
min_wal_size = 512MB

# ─── Query Planner ──────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ─── Slow Query Logging ─────────────────────────────────────
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000       # Log queries > 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 250ms
deadlock_timeout = 1s

# ─── CRITICAL: Query Statistics Extension ───────────────────
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
pg_stat_statements.track_utility = on
track_activity_query_size = 4096

# ─── Auto-vacuum Tuning ─────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ─── Statistics ─────────────────────────────────────────────
track_counts = on
track_functions = all
track_io_timing = on